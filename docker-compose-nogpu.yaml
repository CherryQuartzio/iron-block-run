services:
  minerl:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: minerl-dev:latest
    working_dir: /workspace
    environment:
      TMPDIR: /opt/tmp
      TEMP: /opt/tmp
      TMP: /opt/tmp
      JAVA_HOME: /opt/conda
      DISPLAY: ":99"
      MINERL_LAN_ENABLED: "true"
      MINERL_LAN_PORT: "25565"
      MINERL_PERSISTENT_SERVER: "true"
    volumes:
      - .:/workspace
      - minerl-tmp:/opt/tmp
    ports:
      - target: 6080
        published: 6080
        protocol: tcp
        mode: ingress
      - target: 25565
        published: 25560
        protocol: tcp
        mode: ingress
    shm_size: "4gb"
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    deploy:
      replicas: 1

volumes:
  minerl-tmp:
