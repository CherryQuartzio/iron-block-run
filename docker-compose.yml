services:
  minerl:
    build:
      context: .
      dockerfile: Dockerfile
    image: minerl-dev:latest
    working_dir: /workspace
    environment:
      TMPDIR: /opt/tmp
      TEMP: /opt/tmp
      TMP: /opt/tmp
      JAVA_HOME: /opt/conda
    volumes:
      - .:/workspace
      - minerl-tmp:/opt/tmp
    shm_size: "4gb"
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  minerl-tmp: